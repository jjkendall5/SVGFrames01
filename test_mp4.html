<!DOCTYPE html>
<html>
<head>
    <title>MP4 Export Test</title>
    <script type="module">
        // Import mp4-muxer as ES module
        import { Muxer, ArrayBufferTarget } from 'https://unpkg.com/mp4-muxer@5.1.1/build/mp4-muxer.js';
        
        window.testMP4Export = async function() {
            const output = document.getElementById('output');
            output.innerHTML = 'Starting test...<br>';
            
            try {
                // Check WebCodecs support
                if (!window.VideoEncoder || !window.VideoFrame) {
                    output.innerHTML += '❌ WebCodecs not supported<br>';
                    return;
                }
                output.innerHTML += '✅ WebCodecs supported<br>';
                
                // Create a simple 2-frame animation
                const width = 200;
                const height = 200;
                const fps = 10;
                
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // Create muxer
                output.innerHTML += 'Creating muxer...<br>';
                const muxer = new Muxer({
                    target: new ArrayBufferTarget(),
                    video: {
                        codec: 'avc',
                        width: width,
                        height: height
                    },
                    fastStart: 'in-memory'
                });
                output.innerHTML += '✅ Muxer created<br>';
                
                // Create encoder
                const encoder = new VideoEncoder({
                    output: (chunk, meta) => {
                        output.innerHTML += `Chunk: ${chunk.type}, ${chunk.byteLength} bytes<br>`;
                        muxer.addVideoChunk(chunk, meta);
                    },
                    error: (e) => {
                        output.innerHTML += `❌ Encoder error: ${e.message}<br>`;
                    }
                });
                
                encoder.configure({
                    codec: 'avc1.42001f',
                    width: width,
                    height: height,
                    bitrate: 1_000_000,
                    framerate: fps
                });
                output.innerHTML += '✅ Encoder configured<br>';
                
                // Encode 2 frames
                const frameDuration = 1_000_000 / fps;
                
                for (let i = 0; i < 2; i++) {
                    // Draw something different each frame
                    ctx.fillStyle = i === 0 ? 'red' : 'blue';
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = 'white';
                    ctx.font = '48px Arial';
                    ctx.fillText(`Frame ${i + 1}`, 50, 100);
                    
                    // Create video frame
                    const videoFrame = new VideoFrame(canvas, {
                        timestamp: i * frameDuration,
                        duration: frameDuration
                    });
                    
                    // Encode
                    encoder.encode(videoFrame, { keyFrame: i === 0 });
                    videoFrame.close();
                    
                    output.innerHTML += `Encoded frame ${i + 1}<br>`;
                }
                
                // Flush and close
                output.innerHTML += 'Flushing encoder...<br>';
                await encoder.flush();
                encoder.close();
                output.innerHTML += '✅ Encoder flushed<br>';
                
                // Finalize
                output.innerHTML += 'Finalizing muxer...<br>';
                muxer.finalize();
                
                // Get MP4 data
                const mp4Buffer = muxer.target.buffer;
                output.innerHTML += `✅ MP4 created: ${mp4Buffer.byteLength} bytes<br>`;
                
                // Check if it's really MP4 (should start with 'ftyp')
                const header = new Uint8Array(mp4Buffer.slice(0, 12));
                const headerStr = String.fromCharCode(...header.slice(4, 8));
                output.innerHTML += `File header: ${headerStr} (should be 'ftyp')<br>`;
                
                if (headerStr === 'ftyp') {
                    output.innerHTML += '✅ REAL MP4 FILE!<br>';
                } else {
                    output.innerHTML += '❌ Not MP4 format<br>';
                }
                
                // Download
                const blob = new Blob([mp4Buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'test.mp4';
                link.textContent = 'Download test.mp4';
                document.body.appendChild(document.createElement('br'));
                document.body.appendChild(link);
                
                output.innerHTML += '<br>✅ TEST COMPLETE - Check if download works and plays<br>';
                
            } catch (err) {
                output.innerHTML += `❌ Error: ${err.message}<br>`;
                output.innerHTML += `Stack: ${err.stack}<br>`;
            }
        };
    </script>
</head>
<body>
    <h1>MP4 Export Test</h1>
    <button onclick="testMP4Export()">Test MP4 Export</button>
    <div id="output"></div>
</body>
</html>
